version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: diana-postgres
    environment:
      POSTGRES_USER: diana
      POSTGRES_PASSWORD: diana_password
      POSTGRES_DB: diana_db
    ports:
      - "5435:5432"
    volumes:
      - diana_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U diana -d diana_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: diana-redis
    ports:
      - "6379:6379"
    volumes:
      - diana_redis:/data

volumes:
  diana_pgdata:
  diana_redis:
